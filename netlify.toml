[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "18"

# Redirect /admin to Decap CMS
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# SPA fallback for category pages
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
